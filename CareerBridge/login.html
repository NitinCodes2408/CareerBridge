<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CareerBridge</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card fade-in-up">
      <div class="auth-header">
        <a href="index.html" class="logo">
          <i class='bx bxs-graduation'></i>
          Career<span>Bridge</span>
        </a>
        <h2>Welcome Back</h2>
        <p>Login to your account to continue</p>
      </div>

      <form id="loginForm" class="lead-form" style="background: transparent; padding: 0; box-shadow: none;">
        
        <div class="form-group">
          <label>Select Role</label>
          <div class="role-selector">
            <div class="role-option">
              <input type="radio" id="role-student" name="role" value="student" checked>
              <label for="role-student">
                <i class='bx bxs-user-detail'></i>
                Student
              </label>
            </div>
            <div class="role-option">
              <input type="radio" id="role-employee" name="role" value="employee">
              <label for="role-employee">
                <i class='bx bxs-briefcase'></i>
                Employee
              </label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
